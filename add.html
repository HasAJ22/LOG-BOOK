<!DOCTYPE html>
<html>
<head>
    <title>Add Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2>Add Log Entry</h2>

<form method="POST">

<input type="date" name="tarikh" class="form-control mb-2" required>

<input type="text" name="kapal" placeholder="Nama Kapal" class="form-control mb-2" required>

<input type="text" name="aktiviti" placeholder="Aktiviti" class="form-control mb-2" required>

<input type="text" name="masalah" placeholder="Masalah" class="form-control mb-2" required>

<select name="severity" class="form-control mb-2">
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
</select>

<input type="text" name="tindakan" placeholder="Tindakan" class="form-control mb-2">

<button class="btn btn-success">Save</button>

</form>

<br>
<a href="/logbook" class="btn btn-secondary">⬅ Back</a>

</div>

</body>
</html>
