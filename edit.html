<!DOCTYPE html>
<html>
<head>
    <title>Edit Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2>Edit Log Entry</h2>

<form method="POST">

<input type="date" name="tarikh" value="{{ data[1] }}" class="form-control mb-2" required>

<input type="text" name="kapal" value="{{ data[2] }}" class="form-control mb-2" required>

<input type="text" name="aktiviti" value="{{ data[3] }}" class="form-control mb-2" required>

<input type="text" name="masalah" value="{{ data[4] }}" class="form-control mb-2" required>

<select name="severity" class="form-control mb-2">
    <option value="Low" {% if data[5]=='Low' %}selected{% endif %}>Low</option>
    <option value="Medium" {% if data[5]=='Medium' %}selected{% endif %}>Medium</option>
    <option value="High" {% if data[5]=='High' %}selected{% endif %}>High</option>
</select>

<input type="text" name="tindakan" value="{{ data[6] }}" class="form-control mb-2">

<button class="btn btn-primary">Update</button>

</form>

<br>
<a href="/logbook" class="btn btn-secondary">⬅ Back</a>

</div>

</body>
</html>
